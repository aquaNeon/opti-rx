<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptimizeRx — Scroll X Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-spacer"><p>Scroll down</p></div>

  <!-- ════════════════════════════════════════════════════════════
       SCROLL SCENE
       7 states:
         0 — Start    (no X, white bg)
         1–5 — X slides 1-5  (X #4 triggers dark-bg transition)
         6 — Final    (no Xs, text + button)

       data-scroll-scene  → pinned wrapper
       data-slide         → each slide (0-based)
       data-anim="x-a"    → left  SVG half  (slides inward from left)
       data-anim="x-b"    → right SVG half  (slides inward from right)
       data-anim="left"   → left  pill label
       data-anim="right"  → right pill label
       data-dot           → progress dot
       ════════════════════════════════════════════════════════════ -->
  <section class="scroll-scene" data-scroll-scene>

    <!-- Atmosphere layer (glow + grid) — hidden until dark bg kicks in -->
    <div class="scene-atmo" aria-hidden="true"></div>

    <!-- Dot navigation — 6 dots (one per X slide + final) -->
    <nav class="dot-nav" aria-label="Slide navigation">
      <button class="dot" data-dot="0" aria-label="Slide 1"></button>
      <button class="dot" data-dot="1" aria-label="Slide 2"></button>
      <button class="dot" data-dot="2" aria-label="Slide 3"></button>
      <button class="dot" data-dot="3" aria-label="Slide 4"></button>
      <button class="dot" data-dot="4" aria-label="Slide 5"></button>
      <button class="dot" data-dot="5" aria-label="Final"></button>
    </nav>

    <div class="slides-wrap">

      <!-- ── SLIDE 0 · X #1 ────────────────────────────────── -->
      <article class="slide" data-slide="0">
        <div class="label-pill label-pill--left" data-anim="left">
          <span class="pill-dot" aria-hidden="true"></span>
          <span>HCP Marketer</span>
        </div>

        <div class="x-stage">
          <div class="x-wrap">
            <img class="x-half x-half--left"  src="left.svg"  alt="" data-anim="x-a" draggable="false" aria-hidden="true">
            <img class="x-half x-half--right" src="right.svg" alt="" data-anim="x-b" draggable="false" aria-hidden="true">
          </div>
        </div>

        <div class="label-pill label-pill--right" data-anim="right">
          <span>DTC Marketer</span>
          <span class="pill-dot" aria-hidden="true"></span>
        </div>
      </article>

      <!-- ── SLIDE 1 · X #2 ────────────────────────────────── -->
      <article class="slide" data-slide="1">
        <div class="label-pill label-pill--left" data-anim="left">
          <span class="pill-dot" aria-hidden="true"></span>
          <span>Clinical Journey</span>
        </div>

        <div class="x-stage">
          <div class="x-wrap">
            <img class="x-half x-half--left"  src="left.svg"  alt="" data-anim="x-a" draggable="false" aria-hidden="true">
            <img class="x-half x-half--right" src="right.svg" alt="" data-anim="x-b" draggable="false" aria-hidden="true">
          </div>
        </div>

        <div class="label-pill label-pill--right" data-anim="right">
          <span>Personal Context</span>
          <span class="pill-dot" aria-hidden="true"></span>
        </div>
      </article>

      <!-- ── SLIDE 2 · X #3 ────────────────────────────────── -->
      <article class="slide" data-slide="2">
        <div class="label-pill label-pill--left" data-anim="left">
          <span class="pill-dot" aria-hidden="true"></span>
          <span>Pharma</span>
        </div>

        <div class="x-stage">
          <div class="x-wrap">
            <img class="x-half x-half--left"  src="left.svg"  alt="" data-anim="x-a" draggable="false" aria-hidden="true">
            <img class="x-half x-half--right" src="right.svg" alt="" data-anim="x-b" draggable="false" aria-hidden="true">
          </div>
        </div>

        <div class="label-pill label-pill--right" data-anim="right">
          <span>Agency</span>
          <span class="pill-dot" aria-hidden="true"></span>
        </div>
      </article>

      <!-- ── SLIDE 3 · X #4  ← background turns dark here ─── -->
      <article class="slide" data-slide="3">
        <div class="label-pill label-pill--left" data-anim="left">
          <span class="pill-dot" aria-hidden="true"></span>
          <span>Audience</span>
        </div>

        <div class="x-stage">
          <div class="x-wrap">
            <img class="x-half x-half--left"  src="left.svg"  alt="" data-anim="x-a" draggable="false" aria-hidden="true">
            <img class="x-half x-half--right" src="right.svg" alt="" data-anim="x-b" draggable="false" aria-hidden="true">
          </div>
        </div>

        <div class="label-pill label-pill--right" data-anim="right">
          <span>Channel</span>
          <span class="pill-dot" aria-hidden="true"></span>
        </div>
      </article>

      <!-- ── SLIDE 4 · X #5 ────────────────────────────────── -->
      <article class="slide" data-slide="4">
        <div class="label-pill label-pill--left" data-anim="left">
          <span class="pill-dot" aria-hidden="true"></span>
          <span>Brand</span>
        </div>

        <div class="x-stage">
          <div class="x-wrap">
            <img class="x-half x-half--left"  src="left.svg"  alt="" data-anim="x-a" draggable="false" aria-hidden="true">
            <img class="x-half x-half--right" src="right.svg" alt="" data-anim="x-b" draggable="false" aria-hidden="true">
          </div>
        </div>

        <div class="label-pill label-pill--right" data-anim="right">
          <span>Outcomes</span>
          <span class="pill-dot" aria-hidden="true"></span>
        </div>
      </article>

      <!-- ── SLIDE 5 · Final — no X, text + button ─────────── -->
      <article class="slide slide--final" data-slide="5">
        <div class="final-content" data-anim="right">
          <p class="final-eyebrow">We're leading the way in</p>
          <h2 class="final-heading">Healthcare<br>marketing<br>is evolving.</h2>
          <a href="#" class="final-cta">See how we do it</a>
        </div>
      </article>

    </div><!-- /.slides-wrap -->

  </section><!-- /.scroll-scene -->

  <div class="demo-spacer"><p>Content continues</p></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
